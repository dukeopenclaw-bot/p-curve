<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<title>TCC Tool v1.1</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
:root {
  --bg:#fff; --text:#111; --card:#f4f5f7; --border:#dde1e7;
  --btn:#3b82f6; --btn-txt:#fff; --danger:#ef4444;
  --sidebar-w:280px; --header-h:48px;
}
[data-theme="dark"] {
  --bg:#0f0f0f; --text:#e8e8e8; --card:#1a1a1a; --border:#2a2a2a;
  --btn:#2563eb; --btn-txt:#fff; --danger:#dc2626;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:Arial,sans-serif;
       display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* ── TOPBAR ── */
.topbar { height:var(--header-h); display:flex; align-items:center; gap:10px;
          padding:0 14px; background:var(--card); border-bottom:1px solid var(--border);
          flex-shrink:0; }
.topbar h1 { font-size:16px; font-weight:700; }
.badge { font-size:10px; background:var(--btn); color:#fff; padding:2px 7px;
         border-radius:10px; }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
.status { font-size:11px; padding:3px 8px; border-radius:10px; }
.status.ok  { background:#dcfce7; color:#166534; }
.status.err { background:#fee2e2; color:#991b1b; }
.status.loading { background:#fef9c3; color:#854d0e; }
.icon-btn { background:none; border:1px solid var(--border); border-radius:6px;
            padding:5px 10px; cursor:pointer; color:var(--text); font-size:12px; }
.icon-btn:hover { background:var(--card); }

/* ── LAYOUT ── */
.layout { display:flex; flex:1; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar { width:var(--sidebar-w); background:var(--card); border-right:1px solid var(--border);
           display:flex; flex-direction:column; transition:width .2s ease; overflow:hidden;
           flex-shrink:0; }
.sidebar.collapsed { width:40px; }
.sidebar-toggle { height:40px; display:flex; align-items:center; justify-content:center;
                  cursor:pointer; border-bottom:1px solid var(--border); flex-shrink:0;
                  font-size:16px; background:none; border-left:none; border-right:none;
                  border-top:none; color:var(--text); width:100%; }
.sidebar-content { overflow-y:auto; flex:1; padding:10px; display:flex;
                   flex-direction:column; gap:8px; min-width:calc(var(--sidebar-w) - 0px); }
.sidebar.collapsed .sidebar-content { display:none; }

/* ── PANEL ── */
.panel { background:var(--bg); border:1px solid var(--border); border-radius:8px;
         padding:10px 12px; }
.panel-title { font-size:11px; font-weight:700; text-transform:uppercase;
               letter-spacing:.6px; opacity:.55; margin-bottom:8px; }
.panel-row { display:flex; flex-direction:column; gap:4px; margin-bottom:8px; }
.panel-row:last-child { margin-bottom:0; }
.panel-row label { font-size:11px; opacity:.65; }

/* ── FORM ELEMENTS ── */
input, select { width:100%; padding:6px 8px; border:1px solid var(--border);
                border-radius:5px; background:var(--bg); color:var(--text);
                font-size:12px; }
input:focus, select:focus { outline:2px solid var(--btn); }
.btn { width:100%; padding:7px; border:none; border-radius:5px; cursor:pointer;
       font-size:12px; font-weight:600; background:var(--btn); color:var(--btn-txt); }
.btn:hover { opacity:.88; }
.btn.secondary { background:var(--border); color:var(--text); }
.btn.sm { padding:4px 10px; width:auto; font-weight:normal; }
.btn.danger { background:var(--danger); }
.btn-row { display:flex; gap:6px; }

/* ── MAIN CHART AREA ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.chart-wrap { flex:1; position:relative; padding:12px; }
#chart { width:100% !important; height:100% !important; }

/* ── RELAY LIST ── */
.relay-row { display:flex; align-items:center; gap:7px; padding:5px 0;
             border-bottom:1px solid var(--border); font-size:12px; }
.relay-row:last-child { border-bottom:none; }
.dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.relay-name { flex:1; }
.relay-sub { font-size:10px; opacity:.55; }
#relayList { max-height:160px; overflow-y:auto; }

/* ── COORD RESULT ── */
#coordResult { font-size:13px; font-weight:bold; margin-top:6px; min-height:20px; }

/* ── MODAL ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
           z-index:200; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.modal { background:var(--bg); border:1px solid var(--border); border-radius:10px;
         padding:22px; width:360px; max-width:94vw; }
.modal h3 { font-size:15px; margin-bottom:14px; }
.modal-field { margin-bottom:12px; display:flex; flex-direction:column; gap:4px; }
.modal-field label { font-size:11px; opacity:.6; }
.modal-foot { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <h1>⚡ TCC Tool</h1>
  <span class="badge">v1.1.0</span>
  <div id="statusBar"></div>
  <div class="topbar-right">
    <button class="icon-btn" onclick="openCfg()">⚙ 설정</button>
    <button class="icon-btn" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="사이드바 접기/펼치기">◀</button>

    <div class="sidebar-content">

      <!-- GRAPH LOAD -->
      <div class="panel">
        <div class="panel-title">그래프 불러오기</div>
        <div class="panel-row">
          <label>GraphID</label>
          <input id="graphId" placeholder="예) G-001">
        </div>
        <div class="btn-row">
          <button class="btn" onclick="loadGraph()">불러오기</button>
          <button class="btn secondary sm" onclick="resetZoom()">초기화</button>
        </div>
      </div>

      <!-- RELAY LIST -->
      <div class="panel">
        <div class="panel-title">릴레이 목록 <button class="btn secondary sm" style="float:right" onclick="loadRelays()">새로고침</button></div>
        <div id="relayList"><span style="opacity:.5;font-size:11px">새로고침을 눌러주세요</span></div>
      </div>

      <!-- COORDINATION -->
      <div class="panel">
        <div class="panel-title">Coordination Check</div>
        <div class="panel-row">
          <label>Relay A (후비)</label>
          <select id="relayA"><option value="">선택</option></select>
        </div>
        <div class="panel-row">
          <label>Relay B (주보호)</label>
          <select id="relayB"><option value="">선택</option></select>
        </div>
        <button class="btn" onclick="checkCoord()">협조 검토</button>
        <div id="coordResult"></div>
      </div>

    </div><!-- /sidebar-content -->
  </div><!-- /sidebar -->

  <!-- MAIN -->
  <div class="main">
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
  </div>

</div><!-- /layout -->

<!-- SETTINGS MODAL -->
<div class="overlay" id="cfgModal">
  <div class="modal">
    <h3>⚙ Apps Script 설정</h3>
    <div class="modal-field">
      <label>Google Apps Script 실행 URL</label>
      <input id="cfgUrl" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div style="font-size:11px;opacity:.55;margin-top:-6px">
      배포된 웹앱 URL을 입력하세요. 브라우저에 저장됩니다.
    </div>
    <div class="modal-foot">
      <button class="btn secondary sm" onclick="closeCfg()">취소</button>
      <button class="btn sm" onclick="saveCfg()">저장</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────
const STORE_KEY = 'tcc_script_url';
let SCRIPT_URL  = localStorage.getItem(STORE_KEY) || '';
let chartInst   = null;
let sidebarOpen = true;

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (!SCRIPT_URL) {
    openCfg();
  } else {
    setStatus('연결됨', 'ok');
    loadRelays();
  }
});

// ── SIDEBAR ──────────────────────────────────────────────────
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  const sb  = document.getElementById('sidebar');
  const btn = sb.querySelector('.sidebar-toggle');
  sb.classList.toggle('collapsed', !sidebarOpen);
  btn.textContent = sidebarOpen ? '◀' : '▶';
}

// ── THEME ────────────────────────────────────────────────────
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
}

// ── STATUS ───────────────────────────────────────────────────
function setStatus(msg, type) {
  document.getElementById('statusBar').innerHTML =
    `<span class="status ${type}">${msg}</span>`;
}

// ── MODAL ────────────────────────────────────────────────────
function openCfg()  {
  document.getElementById('cfgUrl').value = SCRIPT_URL;
  document.getElementById('cfgModal').classList.add('open');
}
function closeCfg() { document.getElementById('cfgModal').classList.remove('open'); }
function saveCfg()  {
  const v = document.getElementById('cfgUrl').value.trim();
  if (!v) { alert('URL을 입력하세요'); return; }
  SCRIPT_URL = v;
  localStorage.setItem(STORE_KEY, SCRIPT_URL);
  closeCfg();
  setStatus('연결됨', 'ok');
  loadRelays();
}

// ── API ──────────────────────────────────────────────────────
function api(params) {
  if (!SCRIPT_URL) { openCfg(); return Promise.reject(new Error('URL 미설정')); }
  return fetch(`${SCRIPT_URL}?${new URLSearchParams(params)}`).then(r => r.json());
}
function post(data) {
  if (!SCRIPT_URL) { openCfg(); return Promise.reject(new Error('URL 미설정')); }
  return fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(data) }).then(r => r.json());
}

// ── GRAPH ────────────────────────────────────────────────────
function loadGraph() {
  const gid = document.getElementById('graphId').value.trim();
  if (!gid) { alert('GraphID를 입력하세요'); return; }
  setStatus('불러오는 중...', 'loading');

  api({ type:'graphFull', graphId:gid })
    .then(res => {
      if (res.error) throw new Error(res.error);
      if (!res.curves || !res.curves.length) {
        setStatus('곡선 없음', 'err'); return;
      }
      drawChart(res.curves, res.graph);
      setStatus(`${res.curves.length}개 곡선`, 'ok');
    })
    .catch(e => setStatus('오류: ' + e.message, 'err'));
}

function drawChart(curves, graph) {
  const canvas = document.getElementById('chart');
  const datasets = curves.map(c => ({
    label          : c.label || '(unnamed)',
    data           : c.data.map(p => ({ x: p.I, y: p.t })),
    borderColor    : c.color || '#555',
    backgroundColor: (c.color || '#555') + '22',
    pointRadius    : 0,
    borderWidth    : 2,
    tension        : 0,
  }));

  if (chartInst) chartInst.destroy();
  chartInst = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      animation   : false,
      responsive  : true,
      maintainAspectRatio: false,
      interaction : { mode:'nearest', intersect:false },
      plugins: {
        zoom: {
          pan : { enabled:true, mode:'xy' },
          zoom: { wheel:{ enabled:true }, pinch:{ enabled:true }, mode:'xy' },
        },
        tooltip: {
          callbacks: {
            label: ctx =>
              `${ctx.dataset.label}: I=${ctx.raw.x.toFixed(1)}A, t=${ctx.raw.y.toFixed(3)}s`
          }
        },
        legend: { position:'bottom' }
      },
      scales: {
        x: {
          type : 'logarithmic',
          min  : Number(graph.X_Min) || 10,
          max  : Number(graph.X_Max) || 10000,
          title: { display:true, text:'전류 (A)' },
        },
        y: {
          type : 'logarithmic',
          min  : Number(graph.Y_Min) || 0.01,
          max  : Number(graph.Y_Max) || 100,
          title: { display:true, text:'동작시간 (s)' },
        }
      }
    }
  });
}

function resetZoom() { if (chartInst) chartInst.resetZoom(); }

// ── RELAYS ───────────────────────────────────────────────────
function loadRelays() {
  api({ type:'relays' }).then(data => {
    if (!Array.isArray(data)) return;

    // Render list
    document.getElementById('relayList').innerHTML = data.length === 0
      ? '<span style="opacity:.5;font-size:11px">릴레이 없음</span>'
      : data.map(r => `
          <div class="relay-row">
            <div class="dot" style="background:${r.Color||'#999'}"></div>
            <div class="relay-name">
              <div>${r.RelayTag}</div>
              <div class="relay-sub">${r.Location||''} · ${r.ModelID||''}</div>
            </div>
            <button class="btn danger sm" onclick="deleteRelay('${r.RelayTag}')">✕</button>
          </div>`).join('');

    // Populate dropdowns
    ['relayA','relayB'].forEach(id => {
      const sel = document.getElementById(id);
      const cur = sel.value;
      sel.innerHTML = '<option value="">선택</option>' +
        data.map(r =>
          `<option value="${r.RelayTag}">${r.RelayTag} — ${r.Location||''}</option>`
        ).join('');
      sel.value = cur;
    });
  }).catch(() => {});
}

function deleteRelay(tag) {
  if (!confirm(`"${tag}" 릴레이를 삭제하시겠습니까?`)) return;
  post({ action:'deleteRelay', RelayTag:tag })
    .then(res => {
      if (res.error) { alert('오류: ' + res.error); return; }
      loadRelays();
    });
}

// ── COORDINATION ─────────────────────────────────────────────
function checkCoord() {
  const tagA = document.getElementById('relayA').value;
  const tagB = document.getElementById('relayB').value;
  const resEl = document.getElementById('coordResult');

  if (!tagA || !tagB)  { alert('릴레이 A, B를 선택하세요'); return; }
  if (tagA === tagB)   { alert('서로 다른 릴레이를 선택하세요'); return; }

  setStatus('협조 검토 중...', 'loading');

  Promise.all([
    api({ type:'curveFull', relay:tagA }),
    api({ type:'curveFull', relay:tagB }),
  ]).then(([curvesA, curvesB]) => {
    if (!curvesA.length || !curvesB.length) {
      resEl.innerHTML = '❌ 곡선 데이터 없음'; return;
    }

    let minDiff = Infinity;
    curvesA.forEach(ca => {
      curvesB.forEach(cb => {
        ca.data.forEach(pa => {
          const pb = cb.data.find(p => Math.abs(p.I - pa.I) / pa.I < 0.01);
          if (!pb) return;
          const diff = pb.t - pa.t;
          if (diff > 0 && diff < minDiff) minDiff = diff;
        });
      });
    });

    if (minDiff === Infinity) {
      resEl.innerHTML = '❌ 비교 불가';
      resEl.style.color = '';
    } else if (minDiff < 0.2) {
      resEl.innerHTML = `⚠️ 부족 (Δt=${minDiff.toFixed(3)}s)`;
      resEl.style.color = '#ef4444';
    } else {
      resEl.innerHTML = `✅ OK (Δt=${minDiff.toFixed(3)}s)`;
      resEl.style.color = '#22c55e';
    }

    // Draw comparison chart
    const datasets = [
      ...curvesA.map(c => ({
        label:c.label || tagA, data:c.data.map(p=>({x:p.I,y:p.t})),
        borderColor:c.color||'#3b82f6', pointRadius:0, borderWidth:2, tension:0
      })),
      ...curvesB.map(c => ({
        label:c.label || tagB, data:c.data.map(p=>({x:p.I,y:p.t})),
        borderColor:c.color||'#ef4444', pointRadius:0, borderWidth:2, tension:0,
        borderDash:[5,4]
      })),
    ];

    drawChart(datasets.length ? [{label:'', data:[], borderColor:'#000'}] : [], {
      X_Min:10, X_Max:20000, Y_Min:0.01, Y_Max:100
    });
    // Redraw with coord datasets
    if (chartInst) chartInst.destroy();
    chartInst = new Chart(document.getElementById('chart'), {
      type:'line', data:{ datasets },
      options:{
        animation:false, responsive:true, maintainAspectRatio:false,
        plugins:{
          zoom:{ pan:{enabled:true,mode:'xy'}, zoom:{wheel:{enabled:true},mode:'xy'} },
          tooltip:{ callbacks:{ label:ctx=>`${ctx.dataset.label}: I=${ctx.raw.x.toFixed(1)}A, t=${ctx.raw.y.toFixed(3)}s` }},
          legend:{ position:'bottom' }
        },
        scales:{
          x:{ type:'logarithmic', min:10, max:20000, title:{display:true,text:'전류 (A)'} },
          y:{ type:'logarithmic', min:0.01, max:100, title:{display:true,text:'동작시간 (s)'} }
        }
      }
    });
    setStatus('협조 검토 완료', 'ok');
  }).catch(e => setStatus('오류: ' + e.message, 'err'));
}
</script>
</body>
</html>
