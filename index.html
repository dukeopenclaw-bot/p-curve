<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<title>TCC Tool v2.6</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
:root {
  --bg:#fff; --text:#111; --card:#f4f5f7; --border:#dde1e7;
  --btn:#3b82f6; --btn-txt:#fff; --danger:#ef4444; --success:#22c55e;
  --sidebar-w:300px; --header-h:48px;
}
[data-theme="dark"] {
  --bg:#0f0f0f; --text:#e8e8e8; --card:#1a1a1a; --border:#2a2a2a;
  --btn:#2563eb; --danger:#dc2626; --success:#16a34a;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:Arial,sans-serif;
       display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* ── TOPBAR ── */
.topbar { height:var(--header-h); display:flex; align-items:center; gap:10px;
          padding:0 14px; background:var(--card); border-bottom:1px solid var(--border); flex-shrink:0; }
.topbar h1 { font-size:16px; font-weight:700; }
.badge { font-size:10px; background:var(--btn); color:#fff; padding:2px 7px; border-radius:10px; }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
.status { font-size:11px; padding:3px 8px; border-radius:10px; }
.status.ok      { background:#dcfce7; color:#166534; }
.status.err     { background:#fee2e2; color:#991b1b; }
.status.loading { background:#fef9c3; color:#854d0e; }
.icon-btn { background:none; border:1px solid var(--border); border-radius:6px;
            padding:5px 10px; cursor:pointer; color:var(--text); font-size:12px; }
.icon-btn:hover { background:var(--card); }

/* ── LAYOUT ── */
.layout { display:flex; flex:1; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar { width:var(--sidebar-w); background:var(--card); border-right:1px solid var(--border);
           display:flex; flex-direction:column; transition:width .2s; overflow:hidden; flex-shrink:0; }
.sidebar.collapsed { width:40px; }
.sidebar-toggle { height:40px; display:flex; align-items:center; justify-content:center;
                  cursor:pointer; border-bottom:1px solid var(--border); flex-shrink:0;
                  font-size:16px; background:none; border-left:none; border-right:none;
                  border-top:none; color:var(--text); width:100%; }
.sidebar-inner { overflow-y:auto; flex:1; padding:10px; display:flex; flex-direction:column;
                 gap:8px; min-width:calc(var(--sidebar-w) - 0px); }
.sidebar.collapsed .sidebar-inner { display:none; }

/* ── PANEL ── */
.panel { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
.panel-title { font-size:11px; font-weight:700; text-transform:uppercase;
               letter-spacing:.6px; opacity:.5; margin-bottom:8px; }

/* ── RELAY ITEM ── */
.relay-item { display:flex; align-items:flex-start; gap:8px; padding:7px 0;
              border-bottom:1px solid var(--border); }
.relay-item:last-child { border-bottom:none; }
.relay-item input[type=checkbox] { margin-top:3px; width:15px; height:15px; flex-shrink:0; cursor:pointer; }
.dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; margin-top:3px; }
.relay-meta { flex:1; min-width:0; }
.relay-tag  { font-weight:700; font-size:13px; }
.relay-sub  { font-size:10px; opacity:.55; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.relay-btns { display:flex; gap:4px; flex-shrink:0; }

/* ── BUTTONS ── */
.btn { padding:6px 12px; border:none; border-radius:5px; cursor:pointer;
       font-size:12px; font-weight:600; background:var(--btn); color:#fff; }
.btn:hover { opacity:.88; }
.btn.secondary { background:var(--border); color:var(--text); font-weight:400; }
.btn.danger    { background:var(--danger); }
.btn.success   { background:var(--success); }
.btn.sm { padding:3px 8px; font-size:11px; font-weight:400; }
.btn.full { width:100%; padding:9px; font-size:13px; }
.btn-row { display:flex; gap:6px; }

/* ── FORM ── */
.field { display:flex; flex-direction:column; gap:3px; margin-bottom:10px; }
.field:last-child { margin-bottom:0; }
.field label { font-size:11px; opacity:.6; }
.field input, .field select { width:100%; padding:7px 9px; border:1px solid var(--border);
  border-radius:5px; background:var(--bg); color:var(--text); font-size:12px; }
.field input:focus, .field select:focus { outline:2px solid var(--btn); }
.field-row { display:flex; gap:6px; }
.field-row .field { flex:1; }

/* ── RANGE INPUTS ── */
.range-group { display:flex; align-items:center; gap:5px; }
.range-group input { flex:1; padding:5px 7px; border:1px solid var(--border);
  border-radius:5px; background:var(--bg); color:var(--text); font-size:12px; }
.range-group span { font-size:11px; opacity:.5; flex-shrink:0; }

/* ── MAIN ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.chart-toolbar { display:flex; align-items:center; gap:8px; padding:8px 12px;
                 border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
.chart-hint { font-size:11px; opacity:.4; margin-left:auto; }
.chart-area { flex:1; position:relative; min-height:0; padding:8px 8px 0; }
#chart { width:100% !important; height:100% !important; display:block; }

/* ── CURSOR BAR ── */
.cursor-bar { flex-shrink:0; display:flex; align-items:center; gap:6px;
              padding:6px 12px; border-top:1px solid var(--border);
              background:var(--card); flex-wrap:wrap; }
.cursor-val-list { display:flex; gap:10px; flex-wrap:wrap; flex:1; min-width:0; font-size:11px; }
.cursor-val { display:flex; align-items:center; gap:4px; }
.cursor-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.cursor-x { font-size:12px; font-weight:700; min-width:80px; }

/* ── SETTINGS TABLE (relay settings) ── */
.stbl { width:100%; border-collapse:collapse; font-size:11px; }
.stbl th { padding:4px 6px; background:var(--card); border:1px solid var(--border);
           font-size:10px; text-transform:uppercase; opacity:.6; }
.stbl td { padding:4px 6px; border:1px solid var(--border); }
.stbl tr:hover td { background:var(--card); }

/* ── OVERLAY / MODAL ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
           z-index:200; align-items:flex-start; justify-content:center; padding-top:60px; overflow-y:auto; }
.overlay.open { display:flex; }
.modal { background:var(--bg); border:1px solid var(--border); border-radius:10px;
         padding:22px; width:480px; max-width:96vw; margin-bottom:40px; }
.modal.wide { width:700px; }
.modal h3 { font-size:15px; margin-bottom:16px; }
.modal-foot { display:flex; gap:8px; justify-content:flex-end; margin-top:18px;
              padding-top:14px; border-top:1px solid var(--border); }
.section-title { font-size:12px; font-weight:700; margin:14px 0 8px;
                 padding-bottom:4px; border-bottom:1px solid var(--border); }
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <h1>⚡ TCC Tool</h1>
  <span class="badge">v2.6.0</span>
  <div id="statusBar"></div>
  <div class="topbar-right">
    <button class="icon-btn" onclick="openCfg()">⚙ 설정</button>
    <button class="icon-btn" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<!-- ── LAYOUT ── -->
<div class="layout">

  <!-- ── SIDEBAR ── -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" onclick="toggleSidebar()">◀</button>

    <div class="sidebar-inner">

      <!-- 릴레이 목록 -->
      <div class="panel">
        <div class="panel-title" style="display:flex;align-items:center;justify-content:space-between;">
          <span>릴레이 목록</span>
          <div class="btn-row">
            <button class="btn secondary sm" onclick="loadRelays()">↺</button>
            <button class="btn sm" onclick="openAddRelay()">+ 추가</button>
          </div>
        </div>
        <div id="relayList">
          <span style="font-size:11px;opacity:.5">↺ 버튼을 눌러 불러오세요</span>
        </div>
      </div>

      <!-- 그래프 축 범위 -->
      <div class="panel">
        <div class="panel-title" style="display:flex;align-items:center;justify-content:space-between;">
          <span>그래프 범위</span>
          <button id="autoRangeBtn" class="btn sm success" onclick="toggleAutoRange()">자동</button>
        </div>
        <div id="rangeInputs" style="display:grid;grid-template-columns:28px 1fr 10px 1fr;align-items:center;gap:4px;opacity:.4;pointer-events:none;">
          <span style="font-size:11px;opacity:.55;">X(A)</span>
          <input id="xMin" type="number" value="10" style="padding:4px 5px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);width:100%;">
          <span style="font-size:11px;opacity:.4;text-align:center;">~</span>
          <input id="xMax" type="number" value="10000" style="padding:4px 5px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);width:100%;">
          <span style="font-size:11px;opacity:.55;">Y(s)</span>
          <input id="yMin" type="number" value="0.01" step="0.01" style="padding:4px 5px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);width:100%;">
          <span style="font-size:11px;opacity:.4;text-align:center;">~</span>
          <input id="yMax" type="number" value="1000" style="padding:4px 5px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);width:100%;">
        </div>
        <!-- X축 배율 -->
        <div style="margin-top:6px;display:flex;align-items:center;gap:6px;">
          <span style="font-size:11px;opacity:.55;white-space:nowrap;">X 배율</span>
          <select id="xMultiplierSel" onchange="applyXMultiplier()"
            style="flex:1;padding:3px 5px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);">
            <option value="1">×1 (A)</option>
            <option value="10">×10 (A)</option>
            <option value="100">×100 (A)</option>
            <option value="1000">×1k (A)</option>
            <option value="10000">×10k (A)</option>
          </select>
        </div>

        <!-- 기준 전압 -->
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">
          <div style="display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:4px;">
            <span style="font-size:11px;opacity:.55;white-space:nowrap;">기준전압</span>
            <input id="refVoltage" type="number" step="0.1" placeholder="미입력 시 환산 없음"
              style="padding:4px 5px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);width:100%;">
            <span style="font-size:11px;opacity:.55;">kV</span>
          </div>
          <div style="font-size:10px;opacity:.45;margin-top:3px;">
            입력 시 각 릴레이 전압 기준으로 전류 환산
          </div>
        </div>
      </div>

      <!-- 그래프 그리기 -->
      <button class="btn full success" onclick="drawSelected()">📊 그래프 그리기</button>
      <button class="btn full secondary" onclick="resetZoom()">확대 초기화</button>
      <button class="btn full secondary" onclick="fitChart()">데이터 맞춤</button>

    </div>
  </div>

  <!-- ── MAIN ── -->
  <div class="main">
    <div class="chart-toolbar">
      <span id="chartTitle" style="font-size:13px;font-weight:600;opacity:.7">릴레이를 선택 후 그래프 그리기</span>
      <span class="chart-hint">휠: 확대 / 드래그: 이동</span>
    </div>
    <div class="chart-area">
      <canvas id="chart"></canvas>
    </div>
    <!-- 커서 컨트롤 바 -->
    <div class="cursor-bar" id="cursorBar" style="display:none;">
      <input id="cursorXInput" type="number" step="any" placeholder="A 입력"
        style="width:88px;padding:4px 6px;font-size:12px;font-weight:700;
               border:1px solid var(--border);border-radius:4px;
               background:var(--bg);color:var(--text);"
        oninput="onCursorXInput(this.value)"
        onkeydown="if(event.key==='Enter') onCursorXInput(this.value)">
      <span style="font-size:11px;opacity:.5;">A</span>
      <button class="btn secondary sm" onclick="moveCursor(-5)">◀◀</button>
      <button class="btn secondary sm" onclick="moveCursor(-1)">◀</button>
      <input id="cursorSlider" type="range" min="0" max="100" value="50"
        style="flex:0 0 120px;" oninput="onSliderInput(this.value)">
      <button class="btn secondary sm" onclick="moveCursor(1)">▶</button>
      <button class="btn secondary sm" onclick="moveCursor(5)">▶▶</button>
      <button class="btn secondary sm" onclick="toggleCursor()">커서 끄기</button>
      <div class="cursor-val-list" id="cursorValList"></div>
    </div>
  </div>
</div>

<!-- ══ MODAL: 릴레이 추가/수정 ══ -->
<div class="overlay" id="relayModal">
  <div class="modal">
    <h3 id="relayModalTitle">릴레이 추가</h3>

    <div class="section-title">기본 정보</div>
    <div class="field-row">
      <div class="field">
        <label>RelayTag *</label>
        <input id="f_tag" placeholder="예) REL-F01">
      </div>
      <div class="field">
        <label>위치 / Bay</label>
        <input id="f_loc" placeholder="예) 22kV 1번 피더">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>모델 *</label>
        <select id="f_model" onchange="onModelChange()"><option value="">선택</option></select>
      </div>
      <div class="field">
        <label>전압 (kV)</label>
        <input id="f_volt" type="number" placeholder="22.9">
      </div>
      <div class="field" style="max-width:80px;">
        <label>Is 단위</label>
        <input id="f_isunit" readonly placeholder="—"
          style="background:var(--card);color:var(--text);font-weight:700;text-align:center;">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>CT 1차 (A)</label>
        <input id="f_ctp" type="number" placeholder="400" oninput="calcCT()">
      </div>
      <div class="field">
        <label>CT 2차 (A)</label>
        <input id="f_cts" type="number" placeholder="5" oninput="calcCT()">
      </div>
      <div class="field">
        <label>CT비 (자동)</label>
        <input id="f_ctr" type="number" placeholder="80" readonly style="opacity:.6">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>정격전류 In (A)</label>
        <input id="f_in" type="number" placeholder="5">
      </div>
      <div class="field">
        <label>색상</label>
        <input id="f_color" type="color" value="#3b82f6" style="height:36px;padding:2px;">
      </div>
    </div>
    <div class="field">
      <label>비고</label>
      <input id="f_notes" placeholder="">
    </div>

    <div class="modal-foot">
      <button class="btn secondary" onclick="closeRelayModal()">취소</button>
      <button class="btn" onclick="saveRelay()">저장</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: 보호 설정 (Settings) ══ -->
<div class="overlay" id="settingModal">
  <div class="modal wide">
    <h3 id="settingModalTitle">보호 설정</h3>

    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;">
      <span id="settingRelayInfo" style="font-size:13px;font-weight:600;"></span>
      <button class="btn sm" onclick="openAddSetting()">+ 스테이지 추가</button>
    </div>

    <div style="overflow-x:auto;">
      <table class="stbl">
        <thead>
          <tr>
            <th>Element</th><th>Stage</th><th>Enable</th><th>CurveType</th>
            <th>Is</th><th>TMS</th><th>t (DT)</th><th>t_min</th><th>t_max</th><th></th><th></th>
          </tr>
        </thead>
        <tbody id="settingTableBody"></tbody>
      </table>
    </div>

    <!-- 스테이지 추가/수정 폼 -->
    <div id="addSettingForm" style="display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
      <div class="section-title" id="settingFormTitle">스테이지 추가</div>
      <div class="field-row">
        <div class="field">
          <label>Element</label>
          <select id="s_elem">
            <option value="PHPTOC">PHPTOC (상간)</option>
            <option value="EFPTOC">EFPTOC (지락)</option>
          </select>
        </div>
        <div class="field">
          <label>Stage</label>
          <input id="s_stage" type="number" value="1" min="1" max="3">
        </div>
        <div class="field">
          <label>Curve Type</label>
          <select id="s_curve">
            <option>IEC NI</option><option>IEC VI</option>
            <option>IEC EI</option><option>IEC LTI</option>
            <option>IEEE MI</option><option>IEEE VI</option>
            <option>IEEE EI</option><option>DT</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Is (픽업)</label><input id="s_is" type="number" step="0.01" placeholder="1.2"></div>
        <div class="field"><label>TMS/k</label><input id="s_tms" type="number" step="0.01" placeholder="0.3"></div>
        <div class="field"><label>t (DT, s)</label><input id="s_t" type="number" step="0.01" placeholder=""></div>
        <div class="field"><label>t_min (s)</label><input id="s_tmin" type="number" step="0.01" placeholder="0.1"></div>
        <div class="field"><label>t_max (s)</label><input id="s_tmax" type="number" step="0.01" placeholder=""></div>
      </div>
      <div class="btn-row">
        <button class="btn secondary sm" onclick="closeAddSetting()">취소</button>
        <button class="btn sm" id="settingFormBtn" onclick="saveSetting()">추가</button>
      </div>
    </div>

    <div class="modal-foot">
      <button class="btn secondary" onclick="closeSettingModal()">닫기</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: Apps Script 설정 ══ -->
<div class="overlay" id="cfgModal">
  <div class="modal">
    <h3>⚙ Apps Script 설정</h3>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:12px;">
      <div style="font-size:11px;opacity:.55;margin-bottom:4px;">기본값 (Default URL)</div>
      <div id="defaultUrlText" style="font-size:11px;word-break:break-all;opacity:.8;"></div>
      <button class="btn secondary sm" style="margin-top:6px;" onclick="useDefault()">기본값 사용</button>
    </div>
    <div class="field">
      <label>변경할 URL (변경 시만 입력)</label>
      <input id="cfgUrl" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div style="font-size:11px;opacity:.5;">비워두면 기본값이 사용됩니다.</div>
    <div class="modal-foot">
      <button class="btn secondary" onclick="closeCfg()">취소</button>
      <button class="btn" onclick="saveCfg()">저장</button>
    </div>
  </div>
</div>

<script>
// ══ CONFIG ═══════════════════════════════════════════════════
const STORE_KEY   = 'tcc_script_url';
const DEFAULT_URL = 'https://script.google.com/macros/s/AKfycbyclVqorSU2KOyFZdM7Bc4s_3VuQ7lOYqDfb3ZzXwuarSkCMh2qElGipP6GezEHsz5F/exec';
let   SCRIPT_URL  = localStorage.getItem(STORE_KEY) || DEFAULT_URL;

// ══ STATE ════════════════════════════════════════════════════
let chartInst     = null;
let sidebarOpen   = true;
let allRelays     = [];
let allModels     = [];
let allSettings   = [];
let editingTag    = null;
let settingTag    = null;
let cursorOn      = false;
let cursorX       = null;   // current cursor value in A
let cursorXMin    = 10;
let cursorXMax    = 10000;
let cursorStep    = 0;      // slider position 0~100
let autoRangeOn   = true;   // 그래프 범위 자동/수동
let xMultiplier   = 1;      // X축 표시 배율

// ══ INIT ═════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  setStatus('연결됨', 'ok');
  loadModels();
  loadRelays();
});

// ══ SIDEBAR ══════════════════════════════════════════════════
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  const sb  = document.getElementById('sidebar');
  sb.classList.toggle('collapsed', !sidebarOpen);
  sb.querySelector('.sidebar-toggle').textContent = sidebarOpen ? '◀' : '▶';
}

// ══ THEME ════════════════════════════════════════════════════
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
}

// ══ STATUS ═══════════════════════════════════════════════════
function setStatus(msg, type) {
  document.getElementById('statusBar').innerHTML =
    `<span class="status ${type}">${msg}</span>`;
}

// ══ API ══════════════════════════════════════════════════════
function api(params) {
  if (!SCRIPT_URL) { openCfg(); return Promise.reject(new Error('URL 미설정')); }
  return fetch(`${SCRIPT_URL}?${new URLSearchParams(params)}`).then(r => r.json());
}
function post(data) {
  if (!SCRIPT_URL) { openCfg(); return Promise.reject(new Error('URL 미설정')); }
  return fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(data) }).then(r => r.json());
}

// ══ LOAD DATA ════════════════════════════════════════════════
function loadModels() {
  api({ type:'models' }).then(data => {
    if (!Array.isArray(data)) return;
    allModels = data;
    const sel = document.getElementById('f_model');
    sel.innerHTML = '<option value="">선택</option>' +
      data.map(m => `<option value="${m.ModelID}">${m.Manufacturer} ${m.Model} (${m.IsUnit||'?'})</option>`).join('');
  }).catch(() => {});
}

function getModelIsUnit(modelId) {
  const m = allModels.find(x => x.ModelID === modelId);
  return m ? m.IsUnit || '?' : '?';
}

function onModelChange() {
  const modelId = document.getElementById('f_model').value;
  const m = allModels.find(x => x.ModelID === modelId);
  document.getElementById('f_isunit').value = m ? (m.IsUnit || '?') : '';
}

function loadRelays() {
  setStatus('불러오는 중...', 'loading');
  api({ type:'relays' }).then(data => {
    if (!Array.isArray(data)) { setStatus('오류', 'err'); return; }
    allRelays = data;
    renderRelayList();
    setStatus(`릴레이 ${data.length}개`, 'ok');
  }).catch(e => setStatus('오류: ' + e.message, 'err'));
}

function loadSettings() {
  return api({ type:'settings' }).then(data => {
    allSettings = Array.isArray(data) ? data : [];
    return allSettings;
  });
}

// ══ RENDER RELAY LIST ════════════════════════════════════════
function renderRelayList() {
  const el = document.getElementById('relayList');
  if (!allRelays.length) {
    el.innerHTML = '<span style="font-size:11px;opacity:.5">등록된 릴레이 없음</span>';
    return;
  }
  el.innerHTML = allRelays.map(r => `
    <div class="relay-item">
      <input type="checkbox" id="chk_${r.RelayTag}" value="${r.RelayTag}">
      <div class="dot" style="background:${r.Color||'#999'}"></div>
      <div class="relay-meta">
        <div class="relay-tag">${r.RelayTag}</div>
        <div class="relay-sub">${r.Location||''} · ${r.ModelID||''} · Is: ${getModelIsUnit(r.ModelID)}</div>
      </div>
      <div class="relay-btns">
        <button class="btn secondary sm" onclick="openEditRelay('${r.RelayTag}')">수정</button>
        <button class="btn secondary sm" onclick="openSettingModal('${r.RelayTag}')">설정</button>
        <button class="btn danger sm" onclick="deleteRelay('${r.RelayTag}')">✕</button>
      </div>
    </div>`).join('');
}

// ══ DRAW GRAPH ═══════════════════════════════════════════════
function drawSelected() {
  const checked = allRelays
    .map(r => r.RelayTag)
    .filter(tag => document.getElementById('chk_' + tag)?.checked);

  if (!checked.length) { alert('릴레이를 하나 이상 선택하세요'); return; }

  const refV = parseFloat(document.getElementById('refVoltage').value);
  setStatus('계산 중...', 'loading');
  document.getElementById('chartTitle').textContent =
    checked.join(', ') + (refV ? `  (기준 ${refV}kV)` : '');

  api({ type:'curveCompare', relays: checked.join(',') })
    .then(curves => {
      if (!Array.isArray(curves) || !curves.length) {
        setStatus('곡선 없음', 'err'); return;
      }

      // 전압 환산: I_기준 = I_릴레이 × (V_릴레이 / V_기준)
      if (refV && refV > 0) {
        curves = curves.map(c => {
          const relayData = allRelays.find(r => r.RelayTag === c.relay);
          const relayV = relayData ? parseFloat(relayData.VoltageLevel) : 0;
          const ratio = (relayV && relayV !== refV) ? relayV / refV : 1;
          return {
            ...c,
            pickupI: (c.pickupI || 0) * ratio,
            label: c.relay + ' ' + c.element + ' S' + c.stage +
                   ' (' + c.curveType + ')' +
                   (ratio !== 1 ? ` @${relayV}kV` : ''),
            data: c.data.map(p => ({ I: p.I * ratio, t: p.t }))
          };
        });
      }

      if (autoRangeOn) {
        const r = calcAutoRange(curves);
        document.getElementById('xMin').value = r.xMin;
        document.getElementById('xMax').value = r.xMax;
        document.getElementById('yMin').value = r.yMin;
        document.getElementById('yMax').value = r.yMax;
      }

      const graph = {
        X_Min: document.getElementById('xMin').value || 10,
        X_Max: document.getElementById('xMax').value || 10000,
        Y_Min: document.getElementById('yMin').value || 0.01,
        Y_Max: document.getElementById('yMax').value || 100,
        refVoltage: refV || null,
      };
      renderChart(curves, graph);
      setStatus(`${curves.length}개 곡선` + (refV ? ` · 기준 ${refV}kV` : ''), 'ok');
    })
    .catch(e => setStatus('오류: ' + e.message, 'err'));
}

// ── CURSOR PLUGIN ────────────────────────────────────────────
const cursorPlugin = {
  id: 'cursorLine',
  afterDraw(chart) {
    if (!cursorOn || cursorX === null) return;
    const xScale = chart.scales.x;
    const yScale = chart.scales.y;
    if (!xScale || !yScale) return;

    const xPx = xScale.getPixelForValue(cursorX);
    if (xPx < xScale.left || xPx > xScale.right) return;

    const ctx = chart.ctx;

    // 커서 세로선
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(xPx, yScale.top);
    ctx.lineTo(xPx, yScale.bottom);
    ctx.strokeStyle = 'rgba(220,38,38,0.8)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 3]);
    ctx.stroke();
    ctx.restore();

    // 각 데이터셋 교점 표시
    chart.data.datasets.forEach((ds, i) => {
      const t = interpolateLog(ds.data, cursorX);
      if (t === null) return;
      const yPx = yScale.getPixelForValue(t);
      if (yPx < yScale.top || yPx > yScale.bottom) return;

      // 점
      ctx.save();
      ctx.beginPath();
      ctx.arc(xPx, yPx, 4, 0, Math.PI * 2);
      ctx.fillStyle = ds.borderColor;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.fill();
      ctx.stroke();
      ctx.restore();

      // 값 레이블 (커서 오른쪽)
      const labelX = xPx + 7;
      const labelY = Math.max(yScale.top + 10, Math.min(yScale.bottom - 4, yPx));
      ctx.save();
      ctx.font = 'bold 10px Arial';
      ctx.fillStyle = ds.borderColor;
      ctx.textBaseline = 'middle';
      ctx.fillText(t.toFixed(3) + 's', labelX, labelY);
      ctx.restore();
    });
  }
};

// 로그-로그 보간
function interpolateLog(data, x) {
  if (!data || data.length < 2) return null;
  let p1 = null, p2 = null;
  for (let i = 0; i < data.length - 1; i++) {
    if (!data[i] || !data[i+1] || data[i].x == null || data[i+1].x == null) continue;
    if (data[i].x <= x && data[i + 1].x >= x) {
      p1 = data[i]; p2 = data[i + 1]; break;
    }
  }
  if (!p1 || !p2 || p1.y <= 0 || p2.y <= 0) return null;
  const lx1 = Math.log(p1.x), ly1 = Math.log(p1.y);
  const lx2 = Math.log(p2.x), ly2 = Math.log(p2.y);
  const lx  = Math.log(x);
  if (lx2 === lx1) return p1.y;
  return Math.exp(ly1 + (ly2 - ly1) * (lx - lx1) / (lx2 - lx1));
}

// Y_Max 경계에서 로그-로그 보간으로 클리핑
function clipToYMax(rawData, yMax) {
  const result = [];
  for (let i = 0; i < rawData.length; i++) {
    const p = rawData[i];
    if (!p || p.x == null || p.y == null) { result.push({ x: null, y: null }); continue; }

    if (p.y <= yMax) {
      // 이전 점이 yMax 위에 있었으면 경계점 보간해서 진입점 추가
      if (result.length === 0 && i > 0) {
        const p0 = rawData[i - 1];
        if (p0 && p0.y != null && p0.x > 0 && p.x > 0) {
          const lx0 = Math.log(p0.x), ly0 = Math.log(p0.y);
          const lx1 = Math.log(p.x),  ly1 = Math.log(p.y);
          const lyM = Math.log(yMax);
          if (ly1 !== ly0) {
            const lxB = lx0 + (lx1 - lx0) * (lyM - ly0) / (ly1 - ly0);
            result.push({ x: Math.exp(lxB), y: yMax });
          }
        }
      }
      result.push(p);
    } else {
      // yMax 위로 나가는 경우: 경계점 추가 후 null 브레이크로 선 끊기
      if (result.length > 0) {
        const p0 = rawData[i - 1];
        if (p0 && p0.y != null && p0.y <= yMax) {
          // 직전 점이 범위 안이었으면 경계점 추가
          result.push({ x: p.x, y: yMax });
          result.push({ x: null, y: null }); // 선 끊기
        }
      }
    }
  }
  return result;
}

function renderChart(curves, graph) {
  const canvas = document.getElementById('chart');
  const yMax   = Number(graph.Y_Max) || 100;
  const datasets = curves.map(c => ({
    label          : c.relay + ' ' + c.element + ' S' + c.stage + ' (' + c.curveType + ')',
    data           : clipToYMax(c.data.map(p => ({ x: p.I, y: p.t })), yMax),
    borderColor    : c.color || '#555',
    backgroundColor: (c.color || '#555') + '22',
    pointRadius    : 0,
    borderWidth    : 2,
    tension        : 0,
    spanGaps       : false,
  }));

  // 커서 범위 초기화
  cursorXMin = Number(graph.X_Min) || 10;
  cursorXMax = Number(graph.X_Max) || 10000;
  cursorStep = 50;
  cursorX    = Math.exp(Math.log(cursorXMin) + (Math.log(cursorXMax) - Math.log(cursorXMin)) * 0.5);

  if (chartInst) chartInst.destroy();
  const existing = Chart.getChart(canvas);
  if (existing) existing.destroy();
  Chart.register(cursorPlugin);
  chartInst = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { bottom: 4 } },
      interaction: { mode:'nearest', intersect:false },
      plugins: {
        cursorLine: {},
        zoom: {
          pan : { enabled:true, mode:'xy' },
          zoom: { wheel:{ enabled:true }, pinch:{ enabled:true }, mode:'xy' },
        },
        tooltip: {
          callbacks: { label: ctx =>
            `${ctx.dataset.label}: I=${ctx.raw.x.toFixed(1)}A, t=${ctx.raw.y.toFixed(3)}s` }
        },
        legend: { position:'bottom', labels:{ boxWidth:12, font:{ size:11 } } }
      },
      scales: {
        x: {
          type: 'logarithmic',
          min: Number(graph.X_Min),
          max: Number(graph.X_Max),
          title: { display:true, text: graph.refVoltage ? `전류 (×${xMultiplier} A) @ ${graph.refVoltage}kV` : xAxisTitle() },
          ticks: {
            maxRotation:0, autoSkip:true, maxTicksLimit:8,
            callback: makeXTick()
          },
          afterFit(scale) { scale.paddingBottom = 4; }
        },
        y: {
          type: 'logarithmic',
          min: Number(graph.Y_Min),
          max: Number(graph.Y_Max),
          title: { display:true, text:'동작시간 (s)' },
          ticks: {
            maxTicksLimit:8,
            callback: v => v >= 1e4 ? (v/1e3)+'ks' : v
          }
        }
      }
    }
  });

  // 커서 바 표시
  document.getElementById('cursorBar').style.display = 'flex';
  document.getElementById('cursorSlider').value = 50;
  cursorOn = true;
  updateCursorDisplay();
}

function resetZoom() { if (chartInst) chartInst.resetZoom(); }

function applyXMultiplier() {
  xMultiplier = Number(document.getElementById('xMultiplierSel').value) || 1;
  if (!chartInst) return;
  chartInst.options.scales.x.ticks.callback = makeXTick();
  chartInst.options.scales.x.title.text = xAxisTitle();
  chartInst.update();
}

function makeXTick() {
  return v => {
    const s = v / xMultiplier;
    if (s >= 1e6) return (s/1e6) + 'M';
    if (s >= 1e3) return (s/1e3) + 'k';
    return s;
  };
}

function xAxisTitle() {
  const base = xMultiplier === 1 ? '전류 (A)' : `전류 (×${xMultiplier} A)`;
  return base;
}

function toggleAutoRange() {
  autoRangeOn = !autoRangeOn;
  const btn = document.getElementById('autoRangeBtn');
  const wrap = document.getElementById('rangeInputs');
  btn.textContent  = autoRangeOn ? '자동' : '수동';
  btn.className    = autoRangeOn ? 'btn sm success' : 'btn sm secondary';
  wrap.style.opacity      = autoRangeOn ? '.4' : '1';
  wrap.style.pointerEvents = autoRangeOn ? 'none' : 'auto';
}

// 데이터에서 자동으로 축 범위 계산 (로그 한 decade 여유)
function calcAutoRange(curves) {
  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  curves.forEach(c => {
    (c.data || []).forEach(p => {
      if (!p || p.I <= 0 || p.t <= 0 || p.t >= 1e6) return;
      if (p.I < xMin) xMin = p.I;
      if (p.I > xMax) xMax = p.I;
      if (p.t < yMin) yMin = p.t;
      if (p.t > yMax) yMax = p.t;
    });
  });
  if (!isFinite(xMin)) return { xMin: 10, xMax: 10000, yMin: 0.01, yMax: 100 };
  // 로그 스케일 한 decade 여유
  const dec = v => Math.pow(10, Math.floor(Math.log10(v)));
  const decUp = v => Math.pow(10, Math.ceil(Math.log10(v)));
  return {
    xMin: dec(xMin),
    xMax: decUp(xMax),
    yMin: dec(yMin),
    yMax: decUp(yMax),
  };
}

function fitChart() {
  if (!chartInst) return;
  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  chartInst.data.datasets.forEach(ds => {
    ds.data.forEach(p => {
      if (!p || p.x == null || p.y == null || p.y <= 0) return;
      if (p.x < xMin) xMin = p.x;
      if (p.x > xMax) xMax = p.x;
      if (p.y < yMin) yMin = p.y;
      if (p.y > yMax) yMax = p.y;
    });
  });
  if (!isFinite(xMin)) return;
  chartInst.options.scales.x.min = xMin;
  chartInst.options.scales.x.max = xMax;
  chartInst.options.scales.y.min = yMin;
  chartInst.options.scales.y.max = yMax;
  chartInst.update();
}

// ── CURSOR CONTROLS ──────────────────────────────────────────
function moveCursor(steps) {
  cursorStep = Math.max(0, Math.min(100, cursorStep + steps));
  document.getElementById('cursorSlider').value = cursorStep;
  applyCursorStep();
}

function onSliderInput(val) {
  cursorStep = Number(val);
  applyCursorStep();
}

function applyCursorStep() {
  const logMin = Math.log(cursorXMin);
  const logMax = Math.log(cursorXMax);
  cursorX = Math.exp(logMin + (logMax - logMin) * cursorStep / 100);
  updateCursorDisplay();
  if (chartInst) chartInst.draw();
}

function onCursorXInput(val) {
  const v = parseFloat(val);
  if (!v || v <= 0) return;
  cursorX = Math.max(cursorXMin, Math.min(cursorXMax, v));
  // 슬라이더 동기화
  const logMin = Math.log(cursorXMin), logMax = Math.log(cursorXMax);
  cursorStep = Math.round((Math.log(cursorX) - logMin) / (logMax - logMin) * 100);
  cursorStep = Math.max(0, Math.min(100, cursorStep));
  document.getElementById('cursorSlider').value = cursorStep;
  if (chartInst) chartInst.draw();
  updateCursorDisplay(true); // input은 이미 입력됐으므로 덮어쓰지 않음
}

function toggleCursor() {
  cursorOn = !cursorOn;
  document.querySelector('#cursorBar button:last-of-type').textContent =
    cursorOn ? '커서 끄기' : '커서 켜기';
  if (chartInst) chartInst.draw();
  updateCursorDisplay();
}

function updateCursorDisplay(skipInput) {
  if (!skipInput) {
    const inp = document.getElementById('cursorXInput');
    if (inp) inp.value = cursorOn && cursorX ? cursorX.toFixed(1) : '';
  }

  const listEl = document.getElementById('cursorValList');
  if (!cursorOn || !chartInst || cursorX === null) {
    listEl.innerHTML = '';
    return;
  }

  listEl.innerHTML = chartInst.data.datasets.map(ds => {
    const t = interpolateLog(ds.data, cursorX);
    const tStr = t !== null ? t.toFixed(3) + ' s' : '—';
    return `<span class="cursor-val">
      <span class="cursor-dot" style="background:${ds.borderColor}"></span>
      <span style="opacity:.65;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
            title="${ds.label}">${ds.label}</span>
      <strong>${tStr}</strong>
    </span>`;
  }).join('');
}

// ══ RELAY ADD / EDIT MODAL ═══════════════════════════════════
function openAddRelay() {
  editingTag = null;
  document.getElementById('relayModalTitle').textContent = '릴레이 추가';
  ['f_tag','f_loc','f_volt','f_ctp','f_cts','f_ctr','f_in','f_notes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f_tag').readOnly = false;
  document.getElementById('f_color').value = '#3b82f6';
  document.getElementById('f_model').value = '';
  document.getElementById('f_isunit').value = '';
  document.getElementById('relayModal').classList.add('open');
}

function openEditRelay(tag) {
  const r = allRelays.find(x => x.RelayTag === tag);
  if (!r) return;
  editingTag = tag;
  document.getElementById('relayModalTitle').textContent = '릴레이 수정: ' + tag;
  document.getElementById('f_tag').value   = r.RelayTag   || '';
  document.getElementById('f_tag').readOnly = true;
  document.getElementById('f_loc').value   = r.Location   || '';
  document.getElementById('f_model').value = r.ModelID    || '';
  onModelChange();
  document.getElementById('f_volt').value  = r.VoltageLevel || '';
  document.getElementById('f_ctp').value   = r.CT_Primary  || '';
  document.getElementById('f_cts').value   = r.CT_Secondary || '';
  document.getElementById('f_ctr').value   = r.CT_Ratio    || '';
  document.getElementById('f_in').value    = r.In          || '';
  document.getElementById('f_color').value = r.Color       || '#3b82f6';
  document.getElementById('f_notes').value = r.Notes       || '';
  document.getElementById('relayModal').classList.add('open');
}

function closeRelayModal() {
  document.getElementById('relayModal').classList.remove('open');
  editingTag = null;
}

function calcCT() {
  const p = parseFloat(document.getElementById('f_ctp').value);
  const s = parseFloat(document.getElementById('f_cts').value);
  if (p && s) document.getElementById('f_ctr').value = (p / s).toFixed(2);
}

function saveRelay() {
  const tag = document.getElementById('f_tag').value.trim();
  if (!tag) { alert('RelayTag를 입력하세요'); return; }

  const data = {
    RelayTag    : tag,
    Location    : document.getElementById('f_loc').value,
    ModelID     : document.getElementById('f_model').value,
    VoltageLevel: document.getElementById('f_volt').value,
    CT_Primary  : document.getElementById('f_ctp').value,
    CT_Secondary: document.getElementById('f_cts').value,
    CT_Ratio    : document.getElementById('f_ctr').value,
    In          : document.getElementById('f_in').value,
    Color       : document.getElementById('f_color').value,
    Notes       : document.getElementById('f_notes').value,
  };

  post({ action:'saveRelay', data })
    .then(res => {
      if (res.error) { alert('저장 오류: ' + res.error); return; }
      closeRelayModal();
      loadRelays();
    })
    .catch(e => alert('오류: ' + e.message));
}

function deleteRelay(tag) {
  if (!confirm(`"${tag}" 릴레이를 삭제하시겠습니까?`)) return;
  post({ action:'deleteRelay', RelayTag: tag })
    .then(res => {
      if (res.error) { alert('오류: ' + res.error); return; }
      loadRelays();
    });
}

// ══ SETTINGS MODAL ═══════════════════════════════════════════
function openSettingModal(tag) {
  settingTag = tag;
  document.getElementById('settingModalTitle').textContent = '보호 설정';
  document.getElementById('settingRelayInfo').textContent = tag;
  document.getElementById('addSettingForm').style.display = 'none';
  document.getElementById('settingModal').classList.add('open');

  loadSettings().then(() => renderSettingTable());
}

function closeSettingModal() {
  document.getElementById('settingModal').classList.remove('open');
  settingTag = null;
}

function renderSettingTable() {
  const rows = allSettings.filter(s => s.RelayTag === settingTag);
  const tbody = document.getElementById('settingTableBody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;opacity:.5;padding:12px">설정 없음</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(s => `
    <tr>
      <td>${s.Element}</td>
      <td>${s.Stage}</td>
      <td style="cursor:pointer" onclick="toggleEnable('${s.SettingID}')">${s.Enable === true || s.Enable === 'TRUE' ? '✅' : '❌'}</td>
      <td>${s.CurveType}</td>
      <td>${s.Is}</td>
      <td>${s.TMS||''}</td>
      <td>${s.t||''}</td>
      <td>${s.t_min||''}</td>
      <td>${s.t_max||''}</td>
      <td><button class="btn secondary sm" onclick="editSetting('${s.SettingID}')">수정</button></td>
      <td><button class="btn danger sm" onclick="deleteSetting('${s.SettingID}')">✕</button></td>
    </tr>`).join('');
}

let editingSettingId = null;

function openAddSetting() {
  editingSettingId = null;
  document.getElementById('settingFormTitle').textContent = '스테이지 추가';
  document.getElementById('settingFormBtn').textContent = '추가';
  document.getElementById('s_elem').value  = 'PHPTOC';
  document.getElementById('s_stage').value = '1';
  document.getElementById('s_curve').value = 'IEC NI';
  ['s_is','s_tms','s_t','s_tmin','s_tmax'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('addSettingForm').style.display = 'block';
}

function editSetting(id) {
  const s = allSettings.find(x => String(x.SettingID) === String(id));
  if (!s) return;
  editingSettingId = id;
  document.getElementById('settingFormTitle').textContent = '스테이지 수정';
  document.getElementById('settingFormBtn').textContent = '저장';
  document.getElementById('s_elem').value  = s.Element  || 'PHPTOC';
  document.getElementById('s_stage').value = s.Stage    || 1;
  document.getElementById('s_curve').value = s.CurveType|| 'IEC NI';
  document.getElementById('s_is').value    = s.Is       || '';
  document.getElementById('s_tms').value   = s.TMS      || '';
  document.getElementById('s_t').value     = s.t        || '';
  document.getElementById('s_tmin').value  = s.t_min    || '';
  document.getElementById('s_tmax').value  = s.t_max    || '';
  document.getElementById('addSettingForm').style.display = 'block';
  document.getElementById('addSettingForm').scrollIntoView({ behavior:'smooth' });
}

function closeAddSetting() {
  document.getElementById('addSettingForm').style.display = 'none';
  editingSettingId = null;
}

function toggleEnable(id) {
  const s = allSettings.find(x => String(x.SettingID) === String(id));
  if (!s) return;
  const cur = s.Enable === true || s.Enable === 'TRUE';
  const data = { ...s, Enable: !cur };
  post({ action:'saveSetting', data })
    .then(res => {
      if (res.error) { alert('오류: ' + res.error); return; }
      loadSettings().then(() => renderSettingTable());
    });
}

function saveSetting() {
  const elem  = document.getElementById('s_elem').value;
  const stage = document.getElementById('s_stage').value;
  if (!settingTag || !elem || !stage) { alert('필수 항목을 입력하세요'); return; }

  // 수정 모드: 기존 SettingID 유지 / 추가 모드: 새 ID 생성
  const settingId = editingSettingId || (settingTag + '_' + elem + '_' + stage);

  const data = {
    SettingID : settingId,
    RelayTag  : settingTag,
    Element   : elem,
    Stage     : Number(stage),
    Enable    : true,
    CurveType : document.getElementById('s_curve').value,
    Is        : document.getElementById('s_is').value,
    TMS       : document.getElementById('s_tms').value,
    t         : document.getElementById('s_t').value,
    t_min     : document.getElementById('s_tmin').value,
    t_max     : document.getElementById('s_tmax').value,
    Notes     : '',
  };

  post({ action:'saveSetting', data })
    .then(res => {
      if (res.error) { alert('저장 오류: ' + res.error); return; }
      closeAddSetting();
      loadSettings().then(() => renderSettingTable());
    })
    .catch(e => alert('오류: ' + e.message));
}

function deleteSetting(id) {
  if (!confirm('설정을 삭제하시겠습니까?')) return;
  post({ action:'deleteSetting', SettingID: id })
    .then(res => {
      if (res.error) { alert('오류: ' + res.error); return; }
      loadSettings().then(() => renderSettingTable());
    });
}

// ══ CFG MODAL ════════════════════════════════════════════════
function openCfg() {
  document.getElementById('defaultUrlText').textContent = DEFAULT_URL;
  const saved = localStorage.getItem(STORE_KEY);
  document.getElementById('cfgUrl').value = saved && saved !== DEFAULT_URL ? saved : '';
  document.getElementById('cfgModal').classList.add('open');
}
function closeCfg() { document.getElementById('cfgModal').classList.remove('open'); }
function useDefault() {
  SCRIPT_URL = DEFAULT_URL;
  localStorage.removeItem(STORE_KEY);
  closeCfg();
  setStatus('기본값 연결됨', 'ok');
  loadRelays();
}
function saveCfg() {
  const v = document.getElementById('cfgUrl').value.trim();
  SCRIPT_URL = v || DEFAULT_URL;
  if (v) localStorage.setItem(STORE_KEY, SCRIPT_URL);
  else   localStorage.removeItem(STORE_KEY);
  closeCfg();
  setStatus('연결됨', 'ok');
  loadRelays();
}
</script>
