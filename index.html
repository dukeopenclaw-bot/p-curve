<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TCC Tool</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

<style>
:root {
  --bg: #ffffff;
  --text: #000000;
  --grid: #cccccc;
  --card: #f5f5f5;
}

[data-theme="dark"] {
  --bg: #111;
  --text: #eee;
  --grid: #444;
  --card: #1a1a1a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
  margin: 20px;
}

.section {
  background: var(--card);
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
}

input {
  padding: 6px;
  margin: 4px;
}

button {
  padding: 6px 10px;
  cursor: pointer;
}

canvas {
  background: var(--bg);
  border-radius: 8px;
}
</style>
</head>
<body>

<h1>⚡ TCC Tool</h1>

<button onclick="toggleTheme()">🌙 Toggle Theme</button>

<div class="section">
  <input id="graphId" placeholder="GraphID (G1)">
  <button onclick="loadGraph()">Load Graph</button>
</div>

<canvas id="chart" width="1000" height="600"></canvas>

<script>
const SCRIPT_URL = "YOUR_SCRIPT_URL";

let chart;
let isDark = false;

/*************** THEME ***************/
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
  if (chart) chart.update();
}

/*************** COLOR ***************/
function getColor(i) {
  const colors = [
    "#ff4d4d","#4da6ff","#4dff88",
    "#ffd24d","#cc66ff","#00e6e6"
  ];
  return colors[i % colors.length];
}

/*************** LOAD GRAPH ***************/
function loadGraph() {

  const id = document.getElementById("graphId").value;

  fetch(`${SCRIPT_URL}?type=graphFull&graphId=${id}`)
    .then(res => res.json())
    .then(res => {

      const datasets = res.curves.map((c, i) => ({
        label: c.label,
        data: c.data.map(p => ({ x: p.I, y: p.t })),
        borderColor: getColor(i),
        borderWidth: 2,
        pointRadius: 0,
        tension: 0
      }));

      drawChart(datasets, res.graph);
    });
}

/*************** CHART ***************/
function drawChart(datasets, graph) {

  if (chart) chart.destroy();

  const textColor = getComputedStyle(document.body).color;
  const gridColor = getComputedStyle(document.documentElement)
    .getPropertyValue('--grid');

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: { datasets },

    options: {
      responsive: true,

      interaction: {
        mode: "nearest",
        intersect: false
      },

      plugins: {
        legend: {
          labels: { color: textColor }
        },

        tooltip: {
          callbacks: {
            label: ctx => {
              return `I=${ctx.raw.x.toFixed(1)} A, t=${ctx.raw.y.toFixed(3)} s`;
            }
          }
        },

        zoom: {
          pan: {
            enabled: true,
            mode: 'xy'
          },
          zoom: {
            wheel: { enabled: true },
            pinch: { enabled: true },
            mode: 'xy'
          }
        }
      },

      scales: {
        x: {
          type: "logarithmic",
          min: Number(graph.X_Min),
          max: Number(graph.X_Max),

          ticks: {
            color: textColor,
            callback: val => {
              const v = Number(val);
              if ([1,10,100,1000,10000].includes(v)) return v;
              return "";
            }
          },

          grid: { color: gridColor },

          title: {
            display: true,
            text: "Current (A)",
            color: textColor
          }
        },

        y: {
          type: "logarithmic",
          min: Number(graph.Y_Min),
          max: Number(graph.Y_Max),

          ticks: {
            color: textColor,
            callback: val => {
              const v = Number(val);
              if ([0.01,0.1,1,10,100].includes(v)) return v;
              return "";
            }
          },

          grid: { color: gridColor },

          title: {
            display: true,
            text: "Time (s)",
            color: textColor
          }
        }
      }
    }
  });
}
</script>

</body>
</html>
